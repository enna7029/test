# 工作流名称
name: 部署静态页面到 GitHub Pages

# 触发条件：当推送到 main 分支时执行（如果你的默认分支是 master，改成 master）
on:
  push:
    branches: [ main ]

# 执行的任务
jobs:
  deploy:
    # 运行环境：使用最新的 Ubuntu 系统
    runs-on: ubuntu-latest
    steps:
      # 第一步：拉取源码仓库的代码到服务器
      - name: 拉取源码
        uses: actions/checkout@v4

      # 第二步：配置 GitHub 身份认证（关键）
      - name: 配置 Git 身份
        run: |
          git config --global user.name "你的GitHub用户名"  # 替换成你的用户名，比如 zhangsan
          git config --global user.email "你的GitHub绑定邮箱"  # 比如 zhangsan@xxx.com

      # 第三步：将静态文件推送到 github.io 仓库
      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # 你的 GitHub 个人访问令牌（PAT）
          token: ${{ secrets.PAT }} # 或替换成你手动生成的 PAT（推荐用 Secrets 存储，见下方说明）
          # 目标仓库：你的 github.io 仓库
          repository-name: 你的用户名/你的用户名.github.io  # 比如 zhangsan/zhangsan.github.io
          # 要部署的静态文件目录（源码仓库中存放 HTML 的目录，根目录填 .）
          folder: .  # 如果你的 HTML 在 dist 目录，就填 dist
          # 目标分支：github.io 仓库的 main 分支（默认即可）
          branch: main
          # 清空目标分支原有文件（避免残留）
          clean: true
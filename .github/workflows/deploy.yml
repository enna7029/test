name: 部署 index.html 到 GitHub Pages

on:
  push:
    branches: [ main ]  # 分支名不对就改成 master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 第一步：拉取 test 仓库的代码（包含 index.html）
      - name: 拉取源码
        uses: actions/checkout@v4

      # 第二步：确认文件存在（日志里能看到 index.html）
      - name: 检查文件
        run: |
          ls -la  # 这一步会输出文件列表，确认 index.html 存在
          echo "当前目录：$(pwd)"

      # 第三步：配置 Git 并推送文件到 github.io 仓库
      - name: 推送到 github.io 仓库
        env:
          # 你的 PAT 令牌（存在 test 仓库的 Secrets 里，Name 是 PAT）
          PAT: ${{ secrets.PAT }}
          # 替换成你的 GitHub 用户名
          USERNAME: enna7029
        run: |
          # 克隆 github.io 仓库到本地临时目录
          git clone https://$USERNAME:$PAT@github.com/$USERNAME/$USERNAME.github.io.git temp-gh-pages
          # 进入克隆的目录
          cd temp-gh-pages
          # 删除原有文件（避免残留）
          rm -rf *
          # 复制 test 仓库根目录的 index.html 到当前目录
          cp ../index.html .
          # 提交并推送
          git add .
          git commit -m "自动部署 index.html from test 仓库"
          git push origin main